# Spune provider-ului cum sa se conecteze la Keycloak (credentiale in Secret-ul de mai jos).
# sync-wave 2: dupa ce provider-keycloak (wave 1) si-a instalat CRD-urile (inclusiv ProviderConfig).
apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: keycloak-provider-config
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: keycloak-credentials
      key: credentials