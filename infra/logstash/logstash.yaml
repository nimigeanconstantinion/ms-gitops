apiVersion: logstash.k8s.elastic.co/v1alpha1
kind: Logstash
metadata:
  name: logstash
  namespace: logging
spec:
  version: 8.15.3
  count: 1

  # Referință către Elasticsearch (ECK injectează credentials + TLS automat)
  elasticsearchRefs:
    - clusterName: eck
      name: elasticsearch
      namespace: elastic-system

  # Pipeline configurat inline
  pipelines:
    - pipeline.id: main
      config.string: |
        input {
          tcp {
            port => 5044
            codec => json_lines
            type => "app-logs"
          }
        }

        filter {
          # Curățare câmpuri care nu ne folosesc
          mutate {
            remove_field => ["@version", "host", "port"]
          }

          # Adaugă timestamp dacă lipsește
          if ![timestamp] {
            mutate {
              add_field => { "timestamp" => "%{@timestamp}" }
            }
          }
        }

        output {
          elasticsearch {
            hosts => [ "${ECK_ES_HOSTS}" ]
            user => "${ECK_ES_USER}"
            password => "${ECK_ES_PASSWORD}"
            ssl_certificate_authorities => "${ECK_ES_SSL_CERTIFICATE_AUTHORITY}"
            index => "app-logs-%{+YYYY.MM.dd}"
          }
        }

  # Service pentru log ingestion
  services:
    - name: tcp-input
      service:
        spec:
          type: ClusterIP
          ports:
            - name: tcp-5044
              port: 5044
              targetPort: 5044
              protocol: TCP

  # Resource limits
  podTemplate:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: 1
              memory: 1Gi
          # Securitate
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
