# Ingress pentru Grafana — expune UI public pe https://grafana.icode.mywire.org
# Grafana service e HTTP (3000), nu HTTPS — backend-protocol HTTP simplu

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.icode.mywire.org
      secretName: grafana-tls-cert
  rules:
    - host: grafana.icode.mywire.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
