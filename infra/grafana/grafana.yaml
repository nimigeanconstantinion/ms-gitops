apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    # Label folosit de GrafanaDashboard/GrafanaDatasource pentru a target-a această instanță
    dashboards: "grafana"
spec:
  config:
    log:
      mode: "console"
      level: "info"
    server:
      # URL public — necesar pentru link-uri în emailuri / share dashboards
      root_url: "https://grafana.icode.mywire.org"
      serve_from_sub_path: "false"
    auth:
      disable_login_form: "false"
    # admin_user/admin_password se iau din env vars (SealedSecret grafana-admin-credentials)

  deployment:
    spec:
      replicas: 1
      template:
        spec:
          securityContext:
            fsGroup: 472
            runAsUser: 472
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
          containers:
            - name: grafana
              envFrom:
                - secretRef:
                    name: grafana-admin-credentials
              volumeMounts:
                - name: grafana-data
                  mountPath: /var/lib/grafana
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

  persistentVolumeClaim:
    metadata:
      name: grafana-pvc
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: local-path

  service:
    metadata:
      labels:
        app: grafana
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          protocol: TCP
          targetPort: grafana-http
