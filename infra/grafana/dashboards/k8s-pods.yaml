apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-pods
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"

  # Kubernetes Views - Pods (ID 15759) — pods per namespace, modern, compatibil kube-prometheus-stack
  url: https://grafana.com/api/dashboards/15759/revisions/latest/download

  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

  folder: "Kubernetes"
  resyncPeriod: 24h
