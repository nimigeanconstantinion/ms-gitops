apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: spring-boot-stats
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"

  # Spring Boot 2.1+ Statistics (ID 10280) — JVM, GC, Tomcat threads, HTTP requests
  # Necesită ServiceMonitor pe microservicii + actuator/prometheus expus (când vor veni aplicațiile)
  url: https://grafana.com/api/dashboards/10280/revisions/latest/download

  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

  folder: "Applications"
  resyncPeriod: 24h
