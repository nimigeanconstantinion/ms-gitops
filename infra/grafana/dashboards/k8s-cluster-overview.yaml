apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-cluster-overview
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"

  # Kubernetes Views - Global (ID 15757) — overview cluster modern, compatibil kube-prometheus-stack
  url: https://grafana.com/api/dashboards/15757/revisions/latest/download

  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

  folder: "Kubernetes"
  resyncPeriod: 24h
