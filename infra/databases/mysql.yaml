# MySQL via MOCO.
# MOCO porneste un primary writable single-instance si genereaza automat Secret-ul
# `moco-mysql` (in ns data) cu userii de sistem + parolele lor.
# Aplicatiile se conecteaza ca userul `moco-writable` (are privilegiul CREATE), deci
# isi pot crea singure baza (CREATE DATABASE IF NOT EXISTS) — niciun pas manual.
#   Host:   moco-mysql-primary.data.svc   Port: 3306
#   Creds:  Secret `moco-mysql` -> keys WRITABLE_USER / WRITABLE_PASSWORD
apiVersion: moco.cybozu.com/v1beta2
kind: MySQLCluster
metadata:
  name: mysql
  namespace: data
spec:
  replicas: 1
  podTemplate:
    spec:
      containers:
        - name: mysqld
          image: ghcr.io/cybozu-go/moco/mysql:8.4.8
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi