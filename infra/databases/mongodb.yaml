# MongoDB via MongoDB Community Operator.
# Userul `demo` pe baza `demo`; parola vine din Secret-ul `mongodb-demo-password`
# (sigilat ca SealedSecret — vezi sealed-secrets/). Operatorul genereaza apoi
# credentialele SCRAM in Secret-ul `mongodb-demo-scram`.
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb
  namespace: data
spec:
  members: 1
  type: ReplicaSet
  version: "8.0.4"

  security:
    authentication:
      modes: ["SCRAM"]

  users:
    - name: demo
      db: demo
      passwordSecretRef:
        name: mongodb-demo-password
      roles:
        - name: readWrite
          db: demo
      scramCredentialsSecretName: mongodb-demo-scram

  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 5Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 2Gi