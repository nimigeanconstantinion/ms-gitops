# PLAIN — NU se commit-eaza! (sufixul *-raw.yaml e in .gitignore)
# Credentialele DB Keycloak. username TREBUIE sa fie `keycloak` (= owner-ul din
# keycloak-db-cluster.yaml) ca CNPG sa adopte aceasta parola.
# Anotarile Reflector sunt pe metadata.annotations -> kubeseal le muta in
# spec.template.metadata.annotations -> ajung pe Secret-ul decriptat -> Reflector
# oglindeste Secret-ul in ns `keycloak`.
#
# Sigileaza:
#   kubeseal --controller-namespace kube-system \
#     --controller-name sealed-secrets-controller --format yaml \
#     < infra/databases/secrets/keycloak-db-raw.yaml \
#     > infra/databases/secrets/keycloak-db-sealed.yaml
# Apoi sterge acest fisier.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-app
  namespace: data
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "auth"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "auth"
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: "StrongPassword123!"
