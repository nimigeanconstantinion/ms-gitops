metadata:
  name: mysql-app
  namespace: data
spec:
  encryptedData:
    WRITABLE_PASSWORD: 
    WRITABLE_USER: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: business
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
