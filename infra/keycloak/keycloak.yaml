apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: auth
spec:
  instances: 1
  features:
    enabled:
      - token-exchange
  additionalOptions:
    - name: metrics-enabled
      value: "true"
    - name: health-enabled
      value: "true"
  # Postgres extern (CNPG în ns `data`, secret mirror-uit aici prin Reflector)
  db:
    vendor: postgres
    host: postgres-keycloak-rw.data.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: postgres-keycloak-app
      key: username
    passwordSecret:
      name: postgres-keycloak-app
      key: password

  hostname:
    hostname: https://auth.icode.mywire.org
    strict: true

  # HTTP intern — TLS terminat de Cloudflare extern + nginx HTTP intern
  http:
    httpEnabled: true

  # Proxy headers (X-Forwarded-For, etc.) — nginx-ingress + Cloudflare le setează
  proxy:
    headers: xforwarded

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: auth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.icode.mywire.org
      secretName: keycloak-tls
  rules:
    - host: auth.icode.mywire.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8443
