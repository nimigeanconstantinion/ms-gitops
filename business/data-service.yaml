replicas: 1

image:
  repository: nimigeanconstantinion/data-service
  tag: release-20260330-201808
  pullPolicy: IfNotPresent

containerPort: 8081


podAnnotations:
  co.elastic.logs/json.keys_under_root: "true"
  co.elastic.logs/json.add_error_key: "true"
  co.elastic.logs/json.message_key: "message"
  co.elastic.logs/json.overwrite_keys: "true"

cors:
  allowedOrigins: "http://react-app.local,http://localhost/konga,http://localhost:3000,http://icode.mywire.org"
  additionalOrigins: "http://localhost/kong,http://react-app.local,http://localhost/keycloak"

env:
  - { name: SPRING_PROFILES_ACTIVE, value: argo }
  - { name: KAFKA_BOOTSTRAP_SERVERS, value: demo-kafka-bootstrap.messaging.svc:9092 }
  - { name: APP_KAFKA_TOPIC, value: product-topic }
  - { name: MYSQL_URL, value: "jdbc:mysql://moco-mysql-primary.data.svc:3306/micro_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false" }
  - { name: KEYCLOAK_SERVER_URL, value: https://auth.icode.mywire.org }
  - { name: KEYCLOAK_REALM, value: rsk }
  - { name: KEYCLOAK_ISSUER, value: https://auth.icode.mywire.org/realms/rsk }
  - { name: KEYCLOAK_JWK_SET_URI, value: https://auth.icode.mywire.org/realms/rsk/protocol/openid-connect/certs }
  - name: MYSQL_USERNAME
    valueFrom: { secretKeyRef: { name: mysql-app, key: WRITABLE_USER } }
  - name: MYSQL_PASSWORD
    valueFrom: { secretKeyRef: { name: mysql-app, key: WRITABLE_PASSWORD } }

  # SERVER_SERVLET_CONTEXT_PATH: /car-importer
  # SPRING_KAFKA_BOOTSTRAP_SERVERS: demo-kafka-bootstrap.messaging.svc:9092
  # EXTERNAL_CAR_SOURCE_URL: http://mock-car-source-api.car-platform.svc:8080
  # KEYCLOAK_REALM_URL: https://auth.aws.mycodepractice.com/realms/car-auto-sync
  # KEYCLOAK_CLIENT_ID: car-import-swagger

# probes:
#   path: /car-importer/actuator/health

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  port: 8081

ingress:
  enabled: false


dataService:
  image: ion21/data-service:02.04.2026.05.22.30
  cors:
    allowedOrigins: "http://react-app.local,http://localhost/konga,http://localhost:3000,http://icode.mywire.org"
    additionalOrigins: "http://localhost/kong,http://react-app.local,http://localhost/keycloak"
  env:
  