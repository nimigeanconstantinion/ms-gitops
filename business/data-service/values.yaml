replicas: 1

image:
  repository: ion21/data-service
  tag: d36d509
  pullPolicy: IfNotPresent

containerPort: 8081

podAnnotations:
  co.elastic.logs/json.keys_under_root: "true"
  co.elastic.logs/json.add_error_key: "true"
  co.elastic.logs/json.message_key: "message"
  co.elastic.logs/json.overwrite_keys: "true"

env:
  SPRING_PROFILES_ACTIVE: argo
  KAFKA_BOOTSTRAP_SERVERS: demo-kafka-bootstrap.messaging.svc:9092
  APP_KAFKA_TOPIC: product-topic
  MYSQL_URL: "jdbc:mysql://moco-mysql-primary.data.svc:3306/micro_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
  KEYCLOAK_SERVER_URL: https://auth.icode.mywire.org
  KEYCLOAK_REALM: rsk
  KEYCLOAK_ISSUER: https://auth.icode.mywire.org/realms/rsk
  KEYCLOAK_JWK_SET_URI: https://auth.icode.mywire.org/realms/rsk/protocol/openid-connect/certs

secretEnv:
  MYSQL_USERNAME: { secret: mysql-app, key: WRITABLE_USER }
  MYSQL_PASSWORD: { secret: mysql-app, key: WRITABLE_PASSWORD }

probes:
  path: /actuator/health

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  port: 8081

ingress:
  enabled: false
