apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eck-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Sursa 1: Helm chart oficial Sealed Secrets
    
    - repoURL: https://helm.elastic.co
      chart: eck-operator
      targetRevision: 3.4.0
      helm:
        releaseName: eck-operator
        valueFiles:
          - $values/infra/eck-operator/values.yaml

    # Sursa 2: values overrides din acest repo
    - repoURL: https://github.com/nimigeanconstantinion/ms-gitops.git
      targetRevision: master
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
