apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-ui
  namespace: argocd
  annotations:
    # wave 3: dupa ce clusterul Kafka (wave 2) exista, ca UI-ul sa se conecteze.
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://kafbat.github.io/helm-charts
      chart: kafka-ui
      targetRevision: 1.6.4
      helm:
        releaseName: kafka-ui
        valueFiles:
          - $values/infra/kafka-ui/values.yaml

    - repoURL: https://github.com/nimigeanconstantinion/ms-gitops.git
      targetRevision: master
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: messaging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true